<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    -webkit-font-smoothing: antialiased;
    background: #1A237E;
  }
  body {
    background: linear-gradient(135deg, #3F51B5 0%, #1A237E 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  }
  .mark {
    font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Helvetica, sans-serif;
    font-weight: 700;
    font-size: 340px;
    line-height: 1;
    color: #ffffff;
    letter-spacing: -0.04em;
    position: relative;
    top: -12px;
  }
  .dot {
    position: absolute;
    right: 96px; bottom: 96px;
    width: 56px; height: 56px;
    background: #FFC107;
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="mark">p</div>
  <div class="dot"></div>
</body>
</html>
